name: Claude CI Retry

# CI 실패 시 Claude에게 자동으로 재분석 요청
on:
  workflow_run:
    workflows: ["CI — Build & Type Check"]
    types: [completed]

jobs:
  notify-claude:
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'

    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Get PR number from workflow run
        id: get-pr
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            // PR 번호를 head_branch 정보에서 추출
            const run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id,
            });

            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: run.data.head_branch,
              state: 'open',
            });

            if (prs.data.length > 0) {
              core.setOutput('pr_number', prs.data[0].number);
              core.setOutput('found', 'true');
            } else {
              core.setOutput('found', 'false');
            }

      - name: Comment @claude on PR to retry
        if: steps.get-pr.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = parseInt('${{ steps.get-pr.outputs.pr_number }}');
            const runUrl = context.payload.workflow_run.html_url;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: [
                '@claude CI가 실패했습니다. 빌드 오류를 분석하고 수정해주세요.',
                '',
                `**실패한 CI 워크플로우**: [View logs](${runUrl})`,
                '',
                '다음을 확인해주세요:',
                '- TypeScript 컴파일 오류',
                '- 빌드 실패 원인',
                '- 수정 후 커밋 푸시',
              ].join('\n'),
            });
