name: Claude Loop Engineering

# ─────────────────────────────────────────────────────────────
# loop.spec
#   target  : GitHub Issues (finance-app 레포)
#   trigger : 'claude' 라벨 부착 OR 이슈 코멘트에 @claude 멘션
#   action  : Claude Code가 이슈 읽고 구현 + PR 생성
#   verify  : CI (ci.yml) 빌드 검증
#   record  : 커밋 + PR + 이슈 코멘트 자동 기록
# ─────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  claude-implement:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !github.event.issue.pull_request)

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code — 이슈 분석 및 구현
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 프로젝트 컨텍스트를 Claude에게 주입
          custom_instructions: |
            이 프로젝트는 재테크 초보자를 위한 풀스택 앱입니다.
            - Frontend: React 18 + Vite + TypeScript + Tailwind CSS + Recharts + Framer Motion (frontend/)
            - Backend: NestJS + Prisma 7 + PostgreSQL (backend/)
            - 인증: JWT + Google OAuth + Kakao OAuth

            코드 작성 규칙:
            - 프론트엔드: Tailwind CSS로 다크테마 (#0f1117 배경, 인디고 포인트) 유지
            - 백엔드: NestJS 모듈 구조 유지 (controller / service / module)
            - Prisma 모델 변경 시 prisma/schema.prisma 수정 필수
            - TypeScript strict 모드 준수
            - 한국어 UI 텍스트 사용
