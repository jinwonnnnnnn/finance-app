name: Claude Loop Engineering

# ─────────────────────────────────────────────────────────────
# loop.spec (5단계)
#   1. target  : GitHub Issues
#   2. trigger : 'claude' 라벨 OR @claude 멘션
#   3. action  : Claude Code 이슈 분석 → 코드 수정 → PR 생성
#   4. verify  : CI (ci.yml) 자동 빌드 검증
#   5. record  : 이슈에 작업 로그 댓글 + PR 링크 기록
# ─────────────────────────────────────────────────────────────

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  claude-implement:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '@claude') &&
       !github.event.issue.pull_request)

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # ── 1. 작업 시작 기록 ──────────────────────────────────
      - name: Record — 작업 시작 댓글
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.issue?.number ?? context.payload.issue?.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '## 🤖 Claude Loop Engineering 시작',
                '',
                `- **시작 시각**: ${new Date().toISOString()}`,
                `- **트리거**: ${context.eventName === 'issues' ? '`claude` 라벨 부착' : '@claude 멘션'}`,
                `- **워크플로우**: [실행 로그](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '이슈를 분석하고 코드를 수정합니다. 잠시 기다려주세요...',
              ].join('\n'),
            });

      # ── 2. 코드 체크아웃 ───────────────────────────────────
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 3. Claude Code — 이슈 분석 + 구현 + PR 생성 ────────
      - name: Action — Claude Code 이슈 분석 및 구현
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          custom_instructions: |
            이 프로젝트는 재테크 초보자를 위한 풀스택 앱입니다.
            - Frontend: React 18 + Vite + TypeScript + Tailwind CSS + Recharts + Framer Motion (frontend/)
            - Backend: NestJS + Prisma 7 + PostgreSQL (backend/)
            - 인증: JWT + Google OAuth + Kakao OAuth

            코드 작성 규칙:
            - 프론트엔드: Tailwind CSS 다크테마 (#08090d 배경, 인디고/바이올렛 포인트) 유지
            - 백엔드: NestJS 모듈 구조 유지 (controller / service / module)
            - Prisma 모델 변경 시 prisma/schema.prisma 수정 필수
            - TypeScript strict 모드 준수, 빌드 오류 0개 확인
            - 한국어 UI 텍스트 사용

            작업 완료 후 반드시:
            1. 변경 파일 목록 정리
            2. 테스트 방법 기술
            3. PR 생성 (base: main)

      # ── 4. 작업 완료 기록 (Record) ─────────────────────────
      - name: Record — 작업 완료 댓글
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue_number = context.issue?.number ?? context.payload.issue?.number;
            const success = '${{ job.status }}' === 'success';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: success ? [
                '## ✅ Claude 작업 완료',
                '',
                `- **완료 시각**: ${new Date().toISOString()}`,
                `- **워크플로우 로그**: [확인하기](${runUrl})`,
                '',
                '> PR이 생성되었습니다. CI 빌드가 통과하면 머지 가능합니다.',
                '> CI 실패 시 자동으로 재분석합니다.',
              ].join('\n') : [
                '## ❌ Claude 작업 실패',
                '',
                `- **실패 시각**: ${new Date().toISOString()}`,
                `- **워크플로우 로그**: [오류 확인](${runUrl})`,
                '',
                '> 이슈에 `@claude 다시 시도해줘` 라고 댓글을 달면 재시도합니다.',
              ].join('\n'),
            });
