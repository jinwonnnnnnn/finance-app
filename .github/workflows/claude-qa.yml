name: Claude QA Agent

# PR이 열리거나 새 커밋이 push될 때 자동으로 QA 수행
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  qa-review:
    name: Claude QA Review
    runs-on: ubuntu-latest
    # CI 빌드가 통과한 후에만 실행
    needs: []

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude QA — 변경사항 분석 및 품질 검증
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            이 PR의 변경사항을 QA 관점에서 분석해주세요.

            ## 프로젝트 컨텍스트
            재테크 초보자를 위한 풀스택 앱:
            - Frontend: React 18 + TypeScript + Tailwind CSS + Framer Motion (frontend/src/)
            - Backend: NestJS + Prisma 7 + PostgreSQL (backend/src/)

            ## QA 체크리스트

            ### 1. 코드 품질
            - TypeScript 타입 안전성 (any 남용, 타입 누락)
            - 미처리된 예외나 에러 케이스
            - 콘솔 로그, 디버그 코드 잔재

            ### 2. 보안
            - XSS 취약점 (dangerouslySetInnerHTML 등)
            - SQL Injection (Prisma raw query 사용 시)
            - 민감 정보 노출 (API key, 비밀번호 하드코딩)
            - 인증이 필요한 엔드포인트에 @UseGuards 누락

            ### 3. 기능 검증
            - 변경된 기능이 정상 동작할지 예측
            - 기존 기능에 영향을 줄 수 있는 side effect
            - UI 변경 시 모바일/데스크톱 레이아웃 영향

            ### 4. 성능
            - 불필요한 리렌더링 (React useEffect 의존성)
            - N+1 쿼리 문제 (Prisma include 중첩)

            ## 출력 형식
            PR 댓글로 다음 형식으로 작성해주세요:

            ```
            ## 🔍 Claude QA 리포트

            ### ✅ 통과
            - ...

            ### ⚠️ 경고 (권장 수정)
            - ...

            ### ❌ 차단 (필수 수정)
            - ...

            ### 📝 종합 의견
            ...
            ```

            차단 항목이 없으면 마지막에 "✅ QA 통과 — 머지 가능합니다" 라고 명시해주세요.
            차단 항목이 있으면 "❌ QA 미통과 — 수정 후 재검토 필요" 라고 명시해주세요.
