name: AI Issue Engineer (Groq)

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  ai-implement:
    if: |
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude')) ||
      (github.event_name == 'issue_comment' &&
       (contains(github.event.comment.body, '@ai') || contains(github.event.comment.body, '@claude')) &&
       !github.event.issue.pull_request)

    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post initial comment
        id: comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          result-encoding: string
          script: |
            const issue_number = context.issue?.number ?? context.payload.issue?.number;
            const comment = await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: [
                '## 🤖 AI Issue Engineer 시작',
                '',
                `- **시작 시각**: ${new Date().toISOString()}`,
                `- **모델**: Groq llama-3.3-70b-versatile`,
                `- **워크플로우**: [실행 로그](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
                '',
                '이슈를 분석하고 코드를 수정합니다. 잠시 기다려주세요...',
              ].join('\n'),
            });
            return String(comment.data.id);

      - name: Write issue data to file
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            fs.writeFileSync('/tmp/issue.json', JSON.stringify({
              number: issue.number,
              title: issue.title,
              body: issue.body || '',
            }));

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run AI fix
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ steps.comment.outputs.result }}
        run: node .github/scripts/ai-issue-fix.mjs
